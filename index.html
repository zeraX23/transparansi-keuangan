<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparansi Keuangan - Pemuda RESPEK</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
        }
        * { box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- KONFIGURASI SUPABASE RESPEK ---
        const SUPABASE_URL = "https://ptilwmbqpfhzysnvqvvq.supabase.co"; 
        
        // GANTI teks di bawah ini dengan anon/public key Anda sendiri
        // Bisa diambil di dashboard Supabase Anda: Menu Settings (Gerigi) -> API -> anon (public)
        const SUPABASE_ANON_KEY = "MASUKKAN_ANON_KEY_API_ANDA_DISINI";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [user, setUser] = React.useState(null);
            const [transactions, setTransactions] = React.useState([]);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                // 1. Cek sesi login aktif pengguna saat aplikasi dimuat
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    if (session?.user) fetchTransactions();
                    else setLoading(false);
                });

                // Listen perubahan status auth (login/logout)
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                    if (session?.user) fetchTransactions();
                    else {
                        setTransactions([]);
                        setLoading(false);
                    }
                });

                return () => subscription.unsubscribe();
            }, []);

            // 2. Ambil data asli secara dinamis dari database Supabase
            const fetchTransactions = async () => {
                setLoading(true);
                const { data, error } = await supabaseClient
                    .from('transaksi')
                    .select('*')
                    .order('tanggal', { ascending: false });

                if (error) {
                    console.error("Gagal mengambil data:", error.message);
                } else {
                    setTransactions(data || []);
                }
                setLoading(false);
            };

            // 3. Hitung Otomatis Ringkasan Keuangan dari Data Database
            const totalPemasukan = transactions
                .filter(t => t.tipe === 'masuk')
                .reduce((sum, item) => sum + Number(item.nominal), 0);

            const totalPengeluaran = transactions
                .filter(t => t.tipe === 'keluar')
                .reduce((sum, item) => sum + Number(item.nominal), 0);

            const saldoKas = totalPemasukan - totalPengeluaran;

            // --- FUNGSI LOGIN & LOGOUT ---
            const handleLogin = async () => {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'github',
                    options: {
                        redirectTo: window.location.origin + window.location.pathname
                    }
                });
                if (error) alert("Login Gagal: " + error.message);
            };

            const handleLogout = async () => {
                await supabaseClient.auth.signOut();
            };

            // --- DESAIN STYLING TEMA TERANG RESPEK ---
            const styles = {
                container: { maxWidth: '1000px', margin: '0 auto', padding: '30px 20px' },
                header: { textAlign: 'center', borderBottom: '3px solid #cc0000', paddingBottom: '20px', marginBottom: '30px', position: 'relative' },
                logo: { height: '80px', marginBottom: '10px', objectFit: 'contain' },
                subtitle: { color: '#555', margin: '5px 0 0 0', fontStyle: 'italic', fontSize: '1.1rem', letterSpacing: '1px' },
                card: { backgroundColor: '#ffffff', border: '1px solid #e2e8f0', borderRadius: '10px', padding: '25px', marginBottom: '25px', boxShadow: '0 4px 12px rgba(0,0,0,0.05)' },
                summaryGrid: { display: 'flex', justifyContent: 'space-between', gap: '20px', marginBottom: '30px', flexWrap: 'wrap' },
                summaryItem: { flex: '1 1 200px', textAlign: 'center', padding: '20px 15px', backgroundColor: '#f8fafc', borderRadius: '8px', borderTop: '4px solid #cc0000', boxShadow: '0 2px 6px rgba(0,0,0,0.02)' },
                amount: { fontSize: '1.6rem', fontWeight: 'bold', margin: '12px 0 0 0', color: '#1e293b' },
                textGreen: { color: '#16a34a' },
                textRed: { color: '#dc2626' },
                table: { width: '100%', borderCollapse: 'collapse', marginTop: '15px' },
                th: { backgroundColor: '#cc0000', color: 'white', padding: '14px', textAlign: 'left', fontWeight: '600' },
                td: { borderBottom: '1px solid #e2e8f0', padding: '14px', color: '#334155', verticalAlign: 'top' },
                loginBox: { textAlign: 'center', padding: '40px', background: '#f8fafc', borderRadius: '10px', border: '1px solid #e2e8f0', marginTop: '40px' },
                btn: { cursor: 'pointer', display: 'inline-block', padding: '14px 24px', backgroundColor: '#cc0000', color: 'white', textDecoration: 'none', textAlign: 'center', borderRadius: '6px', fontWeight: 'bold', fontSize: '1.1rem', border: 'none', boxShadow: '0 4px 10px rgba(204,0,0,0.25)' },
                logoutBtn: { position: 'absolute', right: '0', top: '10px', cursor: 'pointer', padding: '8px 15px', backgroundColor: '#e2e8f0', color: '#333', border: 'none', borderRadius: '5px', fontWeight: 'bold' },
                badge: { background: '#f1f5f9', padding: '4px 8px', borderRadius: '4px', fontSize: '0.9rem', whiteSpace: 'nowrap' },
                notaBtn: { display: 'inline-block', padding: '6px 12px', backgroundColor: '#334155', color: '#ffffff', textDecoration: 'none', borderRadius: '4px', fontSize: '0.85rem', fontWeight: '600' },
                noNota: { color: '#94a3b8', fontSize: '0.9rem', fontStyle: 'italic' }
            };

            // 1. TAMPILAN JIKA BELUM LOGIN
            if (!user) {
                return (
                    <div style={styles.container}>
                        <div style={styles.header}>
                            <img src="logo.png" alt="Logo RESPEK" style={styles.logo} onError={(e)=>{e.target.style.display='none'}} />
                            <h2 style={{color: '#cc0000', margin: '0 0 5px 0'}}>RESPEK</h2>
                            <p style={styles.subtitle}>Revolusi Pemuda Kepuh</p>
                        </div>
                        <div style={styles.loginBox}>
                            <h3 style={{ margin: '0 0 10px 0', color: '#1e293b' }}>Portal Transparansi Keuangan</h3>
                            <p style={{ color: '#64748b', margin: '0 0 20px 0' }}>Sistem ini terhubung resmi ke database cloud Pemuda RESPEK.</p>
                            <button onClick={handleLogin} style={styles.btn} disabled={loading}>
                                {loading ? 'Mematikan sistem keamanan...' : 'Masuk Resmi dengan GitHub'}
                            </button>
                        </div>
                    </div>
                );
            }

            // 2. TAMPILAN DASHBOARD UTAMA (SETELAH LOGIN SUKSES)
            return (
                <div style={styles.container}>
                    <div style={styles.header}>
                        <img src="logo.png" alt="Logo RESPEK" style={styles.logo} onError={(e)=>{e.target.style.display='none'}} />
                        <p style={styles.subtitle}>Transparansi Keuangan - Revolusi Pemuda Kepuh</p>
                        <button onClick={handleLogout} style={styles.logoutBtn}>Keluar</button>
                    </div>

                    {loading ? (
                        <p style={{ textAlign: 'center', color: '#64748b' }}>Sinkronisasi data langsung dari database Supabase...</p>
                    ) : (
                        <>
                            {/* Grid Angka Ringkasan */}
                            <div style={styles.summaryGrid}>
                                <div style={styles.summaryItem}>
                                    <p style={{ margin: 0, color: '#64748b', fontSize: '0.95rem', fontWeight: '500' }}>Total Saldo Kas</p>
                                    <p style={styles.amount}>Rp {saldoKas.toLocaleString('id-ID')}</p>
                                </div>
                                <div style={styles.summaryItem}>
                                    <p style={{ margin: 0, color: '#64748b', fontSize: '0.95rem', fontWeight: '500' }}>Pemasukan (Total)</p>
                                    <p style={{ ...styles.amount, ...styles.textGreen }}>+ Rp {totalPemasukan.toLocaleString('id-ID')}</p>
                                </div>
                                <div style={styles.summaryItem}>
                                    <p style={{ margin: 0, color: '#64748b', fontSize: '0.95rem', fontWeight: '500' }}>Pengeluaran (Total)</p>
                                    <p style={{ ...styles.amount, ...styles.textRed }}>- Rp {totalPengeluaran.toLocaleString('id-ID')}</p>
                                </div>
                            </div>

                            {/* Tabel Riwayat Transaksi */}
                            <div style={styles.card}>
                                <h3 style={{ margin: '0 0 15px 0', color: '#1e293b', borderBottom: '2px solid #f1f5f9', paddingBottom: '10px' }}>
                                    Riwayat Transaksi Real-time (Database Cloud)
                                </h3>
                                <div style={{ overflowX: 'auto' }}>
                                    <table style={styles.table}>
                                        <thead>
                                            <tr>
                                                <th style={styles.th}>Tanggal</th>
                                                <th style={styles.th}>Kategori</th>
                                                <th style={{ ...styles.th, width: '35%' }}>Rincian / Penggunaan</th>
                                                <th style={styles.th}>Bukti Nota</th>
                                                <th style={styles.th}>Nominal</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {transactions.length === 0 ? (
                                                <tr>
                                                    <td colSpan="5" style={{ textAlign: 'center', padding: '20px', color: '#94a3b8' }}>Belum ada data transaksi di database Supabase.</td>
                                                </tr>
                                            ) : (
                                                transactions.map(trx => (
                                                    <tr key={trx.id}>
                                                        <td style={styles.td}>{trx.tanggal}</td>
                                                        <td style={styles.td}><span style={styles.badge}>{trx.kategori}</span></td>
                                                        <td style={{ ...styles.td, lineHeight: '1.5' }}>{trx.penggunaan}</td>
                                                        <td style={styles.td}>
                                                            {trx.bukti_nota ? (
                                                                <a href={trx.bukti_nota} target="_blank" rel="noreferrer" style={styles.notaBtn}>
                                                                    📄 Lihat Nota
                                                                </a>
                                                            ) : (
                                                                <span style={styles.noNota}>- Tanpa Nota -</span>
                                                            )}
                                                        </td>
                                                        <td style={{ ...styles.td, color: trx.tipe === 'masuk' ? '#16a34a' : '#dc2626', fontWeight: 'bold' }}>
                                                            {trx.tipe === 'masuk' ? '+' : '-'} Rp {Number(trx.nominal).toLocaleString('id-ID')}
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
