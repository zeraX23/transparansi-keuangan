<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan RESPEK</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #333; }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .container { animation: fadeInUp 0.6s ease-out; max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const SUPABASE_URL = "https://ptilwmbqpfhzysnvqvvq.supabase.co"; 
        const SUPABASE_ANON_KEY = "Sb_publishable_SeDNIncJm7HndgMXKLM85Q__vaA_0h7";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [transactions, setTransactions] = React.useState([]);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setLoading(true);
                const { data } = await supabaseClient
                    .from('transaksi')
                    .select('*')
                    .order('tanggal', { ascending: false });
                setTransactions(data || []);
                setLoading(false);
            };

            // Mengelompokkan data berdasarkan Nama Acara
            const laporanPerAcara = transactions.reduce((acc, curr) => {
                const acara = curr.acara || "Umum/Kas Rutin";
                if (!acc[acara]) acc[acara] = [];
                acc[acara].push(curr);
                return acc;
            }, {});

            return (
                <div className="container">
                    <div style={{textAlign: 'center', borderBottom: '3px solid #cc0000', paddingBottom: '20px', marginBottom: '30px'}}>
                        <h1 style={{color: '#cc0000', margin: '0'}}>LAPORAN KEUANGAN RESPEK</h1>
                        <p style={{fontStyle: 'italic', color: '#555'}}>Update data langsung melalui database Supabase</p>
                    </div>

                    {loading ? <p>Memuat data...</p> : Object.keys(laporanPerAcara).map(acara => (
                        <div key={acara} style={{backgroundColor: '#fff', padding: '20px', borderRadius: '10px', boxShadow: '0 4px 6px rgba(0,0,0,0.05)', marginBottom: '30px'}}>
                            <h2 style={{color: '#cc0000', marginTop: '0', borderLeft: '5px solid #cc0000', paddingLeft: '15px'}}>{acara}</h2>
                            <table style={{width: '100%', borderCollapse: 'collapse'}}>
                                <thead>
                                    <tr style={{backgroundColor: '#f1f5f9'}}>
                                        <th style={{padding: '12px', textAlign: 'left'}}>Tanggal</th>
                                        <th style={{padding: '12px', textAlign: 'left'}}>Rincian</th>
                                        <th style={{padding: '12px', textAlign: 'left'}}>Nominal</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {laporanPerAcara[acara].map(t => (
                                        <tr key={t.id} style={{borderBottom: '1px solid #e2e8f0'}}>
                                            <td style={{padding: '12px'}}>{t.tanggal}</td>
                                            <td style={{padding: '12px'}}>{t.penggunaan}</td>
                                            <td style={{padding: '12px', fontWeight: 'bold', color: t.tipe === 'masuk' ? '#16a34a' : '#dc2626'}}>
                                                {t.tipe === 'masuk' ? '+' : '-'} Rp {Number(t.nominal).toLocaleString('id-ID')}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    ))}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
